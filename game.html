  #help{

<body>
<canvas id="c"></canvas>
<div id="help">
  Act 1: WASD/Arrows move • Enter interact • Find the word (larp) • Use the Secret Door<br>
  Act 2: A/D move • W/Space jump • Enter attack • Q dash • E technique • R ultimate • I inventory • Esc close panels
</div>
<a id="back" href="index.html">← back</a>

<script>
/* =========================
   Canvas + DPI
========================= */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W=0,H=0,dpr=1;

function resize(){
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  initEyes();
  // keep act1 player safely inside on resize
  safeAct1SpawnIfNeeded(true);
}
window.addEventListener("resize", resize);

/* =========================
   Input
========================= */
const keys = new Set();
let pressed = new Set();
window.addEventListener("keydown", (e)=>{
  const k = e.key.toLowerCase();
  if (!keys.has(k)) pressed.add(k);
  keys.add(k);
  if (k === "escape") ui.closeAll();
});
window.addEventListener("keyup", (e)=> keys.delete(e.key.toLowerCase()) );

/* =========================
   Helpers
========================= */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rand=(a,b)=>Math.random()*(b-a)+a;
const chance=(p)=>Math.random()<p;

function aabb(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}
function glowText(text,x,y,alpha=1,size=18){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `700 ${size}px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace`;
  ctx.fillStyle = "rgba(255,255,255,0.78)";
  ctx.shadowColor = "rgba(120,180,255,0.25)";
  ctx.shadowBlur = 12;
  ctx.fillText(text, x, y);
  ctx.restore();
}
function drawWrapped(text,x,y,maxW,lineH){
  const words = text.split(/\s+/);
  let line="";
  for (const w of words){
    const test = line ? line+" "+w : w;
    if (ctx.measureText(test).width > maxW){
      ctx.fillText(line, x, y);
      y += lineH;
      line = w;
    } else line = test;
  }
  if (line) ctx.fillText(line, x, y);
}

/* =========================
   UI panels
========================= */
const ui = {
  panel: null,
  dialogText: "",
  invScroll: 0,
  closeAll(){ this.panel=null; },
  openDialog(text){ this.panel="dialog"; this.dialogText=text; },
  toggleInventory(){ this.panel = (this.panel==="inventory" ? null : "inventory"); },

  draw(game){
    if (!this.panel) return;

    const pad=18;
    const boxW = Math.min(780, W-40);
    const boxH = this.panel==="inventory" ? Math.min(440, H-120) : Math.min(280, H-120);
    const x = (W-boxW)/2, y=(H-boxH)/2;

    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.70)";
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = "rgba(14,14,18,0.92)";
    roundRect(x,y,boxW,boxH,16,true,false);
    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    ctx.lineWidth = 1;
    roundRect(x+0.5,y+0.5,boxW-1,boxH-1,16,false,true);

    ctx.fillStyle = "rgba(255,255,255,0.82)";
    ctx.font = "600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";

    if (this.panel==="dialog"){
      drawWrapped(this.dialogText, x+pad, y+pad+6, boxW-pad*2, 20);
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.font = "500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText("Press Esc to close.", x+pad, y+boxH-18);
    }

    if (this.panel==="inventory"){
      ctx.fillText("INVENTORY", x+pad, y+pad+2);
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.font = "500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText("Press I to close.", x+pad, y+pad+22);

      const listY = y+pad+42;
      const listH = boxH - (pad+60);

      ctx.save();
      ctx.beginPath();
      ctx.rect(x+pad, listY, boxW-pad*2, listH);
      ctx.clip();

      const items = game.inventory;
      let yy = listY - this.invScroll;
      for (let i=0;i<items.length;i++){
        const it = items[i];
        const rowH = 26;

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(x+pad, yy, boxW-pad*2, rowH-2);

        ctx.fillStyle = "rgba(255,255,255,0.80)";
        ctx.font = "600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
        ctx.fillText(`${it.name}  [${it.rarity}]`, x+pad+10, yy+18);

        yy += rowH;
      }
      ctx.restore();

      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.font = "500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText(`Items: ${items.length}`, x+pad, y+boxH-18);
    }

    ctx.restore();
  }
};

/* =========================
   Avatar (optional avatar.png)
========================= */
const avatarImg = new Image();
let avatarReady = false;
avatarImg.onload = () => { avatarReady = true; };
avatarImg.onerror = () => { avatarReady = false; };
avatarImg.src = "avatar.png";

function drawAvatarOrFallback(pl, camX){
  const x = pl.x - camX;
  const y = pl.y;

  ctx.save();
  ctx.shadowColor = "rgba(120,180,255,0.25)";
  ctx.shadowBlur = 26;
  ctx.strokeStyle = "rgba(120,180,255,0.10)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x + pl.w/2, y + pl.h/2, 44, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  if (avatarReady){
    ctx.save();
    if (pl.iFrames > 0) ctx.globalAlpha = 0.75;

    if (pl.face < 0){
      ctx.translate(x + pl.w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(avatarImg, 0, 0, avatarImg.width, avatarImg.height, 0, y, pl.w, pl.h);
    } else {
      ctx.drawImage(avatarImg, 0, 0, avatarImg.width, avatarImg.height, x, y, pl.w, pl.h);
    }
    ctx.restore();
    return;
  }

  ctx.fillStyle = "rgba(255,255,255,0.12)";
  roundRect(x, y, pl.w, pl.h, 18, true, false);
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(x+8, y+22, pl.w-16, 4);
}

/* =========================
   Act 1: Rooms + Code
========================= */
const SECRET_CODE = "larp";
let hasCode = false;

const act1 = {
  room: "void",
  player: { x: 0, y: 0, w: 44, h: 72, vx:0, vy:0, onGround:false, face:1, iFrames:0 },
  groundY(){ return H - 160; },

  rooms: {
    void: {
      name: "THE VOID",
      walls: (W,H)=>[
        {x:40,y:40,w:W-80,h:20},{x:40,y:40,w:20,h:H-80},
        {x:40,y:H-60,w:W-80,h:20},{x:W-60,y:40,w:20,h:H-80},
        {x:W*0.44,y:H*0.28,w:28,h:160}
      ],
      doors: (W,H)=>[
        {x:W-95,y:H*0.44,w:35,h:110,to:"hall_eyes", spawn:{x:80,y:H-240}}
      ],
      npc: (W,H)=>({ x: W*0.18, y: (H-160) - 96, w: 56, h: 96 }), // NEW: little character
      text: [
        {t:"YOU CLICKED.", y:110},
        {t:"SO THE ROOM OPENED.", y:136},
        {t:"THE DOOR IS RIGHT.", y:(H)=>H-80}
      ]
    },

    hall_eyes: {
      name: "HALL OF EYES",
      walls: (W,H)=>[
        {x:40,y:40,w:W-80,h:20},{x:40,y:40,w:20,h:H-80},
        {x:40,y:H-60,w:W-80,h:20},{x:W-60,y:40,w:20,h:H-80},
        {x:W*0.26,y:90,w:28,h:H*0.55},
        {x:W*0.74-28,y:90,w:28,h:H*0.55}
      ],
      doors: (W,H)=>[
        {x:60,y:H*0.44,w:35,h:110,to:"void", spawn:{x:W*0.50,y:H-240}},
        {x:W*0.5-60,y:50,w:120,h:26,to:"code_room", spawn:{x:W*0.5-40,y:H-240}},
        {x:W*0.5-70,y:H-110,w:140,h:34,event:"secretDoor"}
      ],
      text: [
        {t:"DON'T LOOK LEFT.", y:110},
        {t:"DON'T LOOK RIGHT.", y:136},
        {t:"WALK UP.", y:162}
      ]
    },

    code_room: {
      name: "THE ONE WHO KNOWS",
      walls: (W,H)=>[
        {x:40,y:40,w:W-80,h:20},{x:40,y:40,w:20,h:H-80},
        {x:40,y:H-60,w:W-80,h:20},{x:W-60,y:40,w:20,h:H-80},
        {x:W*0.5-110,y:H*0.58,w:220,h:26}
      ],
      doors: (W,H)=>[
        {x:W*0.5-60,y:H-60,w:120,h:20,to:"hall_eyes", spawn:{x:W*0.5-40,y:110}}
      ],
      npc: (W,H)=>({ x: W*0.5-18, y: H*0.40, w: 60, h: 110 }),
      text: [
        {t:"SOMEONE IS IN HERE.", y:110},
        {t:"THEY PRETEND YOU'RE NOT.", y:136}
      ]
    }
  }
};

/* ===== Eyes (must exist before resize runs) ===== */
const eyes = [];
function initEyes(){
  eyes.length = 0;
  for (let i=0;i<120;i++){
    const side = Math.random()<0.5 ? "L":"R";
    const x = side==="L" ? rand(70, 190) : rand(W-190, W-70);
    const y = rand(80, H-120);
    eyes.push({x,y, blink: rand(0,220), r: rand(4,11)});
  }
}

function act1Walls(){ return act1.rooms[act1.room].walls(W,H); }
function act1Doors(){ return act1.rooms[act1.room].doors(W,H); }
function act1Npc(){ const room = act1.rooms[act1.room]; return room.npc ? room.npc(W,H) : null; }

// NEW: safe spawn + keep inside borders
function safeAct1SpawnIfNeeded(force=false){
  const pl = act1.player;
  const g = act1.groundY();
  if (force || !isFinite(pl.x) || !isFinite(pl.y) || pl.y > H+500 || pl.y < -500){
    pl.x = Math.max(80, Math.min(W*0.5, W-120));
    pl.y = g - pl.h;
    pl.vx = 0; pl.vy = 0;
    pl.onGround = true;
  }
}
function clampAct1InsideRoom(){
  const pl = act1.player;
  const borderPad = 62; // keeps you away from the border wall blocks
  const g = act1.groundY();
  pl.x = clamp(pl.x, borderPad, W - borderPad - pl.w);
  pl.y = clamp(pl.y, 60, g - pl.h);
}

function act1Move(dt){
  const pl = act1.player;
  const accel = 2400, maxSpd = 520, friction = 2600;

  let move = 0;
  if (keys.has("a") || keys.has("arrowleft")) move -= 1;
  if (keys.has("d") || keys.has("arrowright")) move += 1;

  if (move !== 0){ pl.face = move; pl.vx += move * accel * dt; }
  else {
    if (pl.vx > 0) pl.vx = Math.max(0, pl.vx - friction*dt);
    else if (pl.vx < 0) pl.vx = Math.min(0, pl.vx + friction*dt);
  }
  pl.vx = clamp(pl.vx, -maxSpd, maxSpd);

  const wantJump = pressed.has("w") || pressed.has(" ") || pressed.has("arrowup");
  if (wantJump && pl.onGround) pl.vy = -820;

  pl.vy += game.gravity * dt;

  pl.x += pl.vx * dt;
  pl.y += pl.vy * dt;

  const walls = act1Walls();
  pl.onGround = false;

  for (const w of walls){
    if (!aabb(pl, w)) continue;

    const prevY = pl.y - pl.vy * dt;
    const wasAbove = prevY + pl.h <= w.y + 2;

    if (wasAbove){
      pl.y = w.y - pl.h;
      pl.vy = 0;
      pl.onGround = true;
    } else {
      const mid = (pl.x + pl.w/2) - (w.x + w.w/2);
      if (mid < 0) pl.x = w.x - pl.w;
      else pl.x = w.x + w.w;
      pl.vx = 0;
    }
  }

  const g = act1.groundY();
  if (pl.y + pl.h >= g){
    pl.y = g - pl.h;
    pl.vy = 0;
    pl.onGround = true;
  }

  clampAct1InsideRoom();
}

function act1Interact(){
  const pl = act1.player;
  const pad = { x:pl.x-14, y:pl.y-12, w:pl.w+28, h:pl.h+24 };

  // NEW: little NPC in THE VOID
  if (act1.room === "void"){
    const npc = act1Npc();
    if (npc && aabb(pad, npc)){
      ui.openDialog(
        "Little figure:\n\n" +
        "\"Door on the right.\"\n" +
        "\"Hallway full of eyes.\"\n" +
        "\"Somebody upstairs knows the word.\"\n\n" +
        "(Press Enter on doors. Enter on people.)"
      );
      return;
    }
  }

  // talk NPC in code room
  if (act1.room === "code_room"){
    const npc = act1Npc();
    if (npc && aabb(pad, npc)){
      hasCode = true;
      ui.openDialog(
        "The figure speaks like a narrator.\n\n" +
        "\"You want the word?\"\n\n" +
        "CODE: larp\n\n" +
        "\"Now go. The hallway is impatient.\""
      );
      return;
    }
  }

  // doors
  for (const d of act1Doors()){
    if (!aabb(pad, d)) continue;

    if (d.to){
      act1.room = d.to;
      act1.player.x = d.spawn.x;
      act1.player.y = d.spawn.y;
      act1.player.vx = 0;
      act1.player.vy = 0;
      clampAct1InsideRoom();
      return;
    }

    if (d.event === "secretDoor"){
      if (!hasCode){
        ui.openDialog("The door is sealed.\n\nIt wants a word you do not have yet.");
        return;
      }
      game.enterHub(true);
      return;
    }
  }
}

function drawSmallNpc(npc, label){
  ctx.save();
  ctx.shadowColor = "rgba(255,255,255,0.08)";
  ctx.shadowBlur = 14;
  ctx.fillStyle = "rgba(255,255,255,0.09)";
  roundRect(npc.x, npc.y, npc.w, npc.h, 16, true, false);
  ctx.restore();

  // tiny face
  ctx.fillStyle = "rgba(0,0,0,0.40)";
  ctx.fillRect(npc.x + 14, npc.y + 30, npc.w - 28, 6);
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(npc.x + 18, npc.y + 48, 6, 6);
  ctx.fillRect(npc.x + npc.w - 24, npc.y + 48, 6, 6);

  glowText(label, npc.x - 6, npc.y - 10, 0.45, 14);
}

function drawAct1(){
  ctx.fillStyle = "#050507";
  ctx.fillRect(0,0,W,H);

  const t = game.t;
  for (let i=0;i<9;i++){
    const y = (H*(i/9)) + Math.sin(t*0.7 + i)*18;
    ctx.strokeStyle = "rgba(120,180,255,0.04)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(40, y);
    ctx.bezierCurveTo(W*0.35, y-40, W*0.65, y+40, W-40, y);
    ctx.stroke();
  }

  const room = act1.rooms[act1.room];
  const walls = act1Walls();
  ctx.fillStyle = "rgba(255,255,255,0.06)";
  for (const w of walls) ctx.fillRect(w.x,w.y,w.w,w.h);

  for (const d of act1Doors()){
    const isSecret = d.event === "secretDoor";
    const visible = !isSecret || hasCode;
    if (!visible) continue;

    ctx.fillStyle = isSecret ? "rgba(255,80,80,0.12)" : "rgba(120,180,255,0.10)";
    ctx.fillRect(d.x,d.y,d.w,d.h);
    ctx.strokeStyle = isSecret ? "rgba(255,80,80,0.18)" : "rgba(120,180,255,0.18)";
    ctx.strokeRect(d.x+0.5,d.y+0.5,d.w-1,d.h-1);

    if (isSecret) glowText("SECRET DOOR", d.x + 10, d.y + d.h - 10, 0.7, 14);
  }

  // eyes effect
  if (act1.room === "hall_eyes"){
    const px = act1.player.x + act1.player.w/2;
    const py = act1.player.y + act1.player.h/2;

    for (const e of eyes){
      e.blink += 1;
      const blinking = Math.sin(e.blink/14) > 0.992;

      ctx.beginPath();
      ctx.fillStyle = "rgba(255,255,255,0.04)";
      ctx.ellipse(e.x, e.y, e.r*2.3, e.r*1.2, 0, 0, Math.PI*2);
      ctx.fill();

      if (blinking){
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(e.x - e.r*2, e.y);
        ctx.lineTo(e.x + e.r*2, e.y);
        ctx.stroke();
        continue;
      }

      ctx.strokeStyle = "rgba(255,255,255,0.10)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, e.r*2.4, e.r*1.3, 0, 0, Math.PI*2);
      ctx.stroke();

      const dx = clamp((px - e.x)/140, -1, 1);
      const dy = clamp((py - e.y)/140, -1, 1);
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.beginPath();
      ctx.arc(e.x + dx*e.r*0.9, e.y + dy*e.r*0.9, Math.max(2, e.r*0.55), 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.14)";
      ctx.fillRect(e.x + dx*e.r*0.9 + 1, e.y + dy*e.r*0.9 - 1, 2, 2);
    }

    ctx.fillStyle = "rgba(255,255,255,0.015)";
    ctx.fillRect(0,0,W,H);
  }

  // NPCs in rooms
  if (act1.room === "void"){
    const npc = act1Npc();
    if (npc) drawSmallNpc(npc, "…");
  }
  if (act1.room === "code_room"){
    const npc = act1Npc();
    if (npc) drawSmallNpc(npc, "…");
  }

  drawAvatarOrFallback(act1.player, 0);

  glowText(room.name, 60, 84, 0.55, 18);

  ctx.font = "600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
  ctx.fillStyle = "rgba(255,255,255,0.55)";
  for (const line of (room.text||[])){
    const yy = (typeof line.y === "function") ? line.y(H) : line.y;
    ctx.fillText(line.t, 60, yy);
  }

  if (hasCode) glowText("code: larp", 60, 110, 0.35, 14);
}

/* =========================
   Act 2: Hub + Dungeon (unchanged)
========================= */
const game = {
  state: "act1",
  gravity: 1800,
  dt: 0,
  t: 0,
  inventory: [],
  cameraX: 0,
  quests: [],
  questIndex: 0,

  hub: { npc:{x:240,y:0,w:60,h:120}, board:{x:440,y:0,w:90,h:110}, door:{x:760,y:0,w:90,h:140} },
  player: { x:140,y:0,w:44,h:72,vx:0,vy:0,onGround:false,face:1,hp:10,maxHp:10,iFrames:0,dashCd:0,techCd:0,ultCd:0,ultMeter:0,atkCd:0 },

  platforms: [], pits: [], enemies: [], loot: [], projectiles: [],
  exit: {x:0,y:0,w:80,h:160},

  enterHub(openDialog){
    this.state="hub"; this.cameraX=0; this.inventory=[]; this.quests=[]; this.questIndex=0;
    const pl=this.player;
    pl.x=140; pl.vx=0; pl.vy=0; pl.hp=pl.maxHp; pl.ultMeter=0;
    pl.dashCd=pl.techCd=pl.ultCd=pl.atkCd=0; pl.iFrames=0;
    if(openDialog){
      ui.openDialog("The secret door opens.\n\nWelcome to the real game.\n\nTalk to the Quest Board, then enter the Dungeon Gate.");
    }
  },

  startRun(){
    this.state="dungeon"; this.cameraX=0; this.inventory=[];
    this.quests=[
      {title:"Quest 1: First Blood", type:"kills", needed:5, progress:0, done:false},
      {title:"Quest 2: Relic Hunt", type:"collect", needed:3, progress:0, done:false},
      {title:"Quest 3: Reach the Exit", type:"reach", done:false}
    ];
    this.questIndex=0;
    const pl=this.player;
    pl.x=120; pl.vx=0; pl.vy=0; pl.hp=pl.maxHp; pl.ultMeter=0;
    pl.dashCd=pl.techCd=pl.ultCd=pl.atkCd=0; pl.iFrames=0;
    genDungeon();
    ui.openDialog("Run begins.\n\nTake quests. Take loot.\nReach the EXIT.");
  }
};

function placeHubObjects(){
  const groundY = H - 160;
  game.hub.npc.y = groundY - game.hub.npc.h;
  game.hub.board.y = groundY - game.hub.board.h;
  game.hub.door.y = groundY - game.hub.door.h;
}
function currentQuest(){ return game.quests[game.questIndex]; }
function makeEnemy(x,y){ return {x,y,w:46,h:62,vx:0,vy:0,hp:3,alive:true,aggro:520,spd:rand(160,220),hitCd:0}; }
function makeLoot(x,y,questRelic=false){
  const roll=Math.random();
  let rarity="common";
  if(roll<0.55) rarity="common"; else if(roll<0.78) rarity="uncommon"; else if(roll<0.92) rarity="rare"; else if(roll<0.985) rarity="epic"; else rarity="mythic";
  const names=["Ink Charm","Moon Thread","Hush Ring","Shiver Crest","Vault Token","Glass Fang","Neon Seal","Warden Key","Paper Relic","Star Scrap"];
  const name=questRelic?"Relic Shard":names[(Math.random()*names.length)|0];
  return {x,y,w:22,h:22,vy:0,taken:false,rarity,name,questRelic};
}
function genDungeon(){
  game.platforms=[]; game.enemies=[]; game.loot=[]; game.projectiles=[]; game.pits=[];
  const groundY=H-160, levelLen=5200;
  game.platforms.push({x:-200,y:groundY,w:levelLen+400,h:260});
  let x=260;
  for(let i=0;i<18;i++){ const w=rand(140,260); const y=groundY-rand(140,360); game.platforms.push({x,y,w,h:26}); x+=rand(200,340); }
  for(let i=0;i<6;i++){ const px=rand(600,levelLen-800); const pw=rand(140,240); game.pits.push({x:px,w:pw}); }
  for(let i=0;i<14;i++){ const ex=rand(520,levelLen-500); const ey=groundY-80; game.enemies.push(makeEnemy(ex,ey)); }
  for(let i=0;i<3;i++){ const lx=rand(900,levelLen-900); const ly=groundY-rand(220,380); game.loot.push(makeLoot(lx,ly,true)); }
  game.exit.x=levelLen-140; game.exit.y=groundY-120; game.exit.w=90; game.exit.h=160;
  game.cameraX=0;
}
function resolvePlatforms(body){
  body.onGround=false;
  for(const p of game.platforms){
    if(body.x+body.w<p.x || body.x>p.x+p.w) continue;
    const prevY=body.y-body.vy*game.dt;
    const wasAbove=prevY+body.h<=p.y+2;
    const nowBelowTop=body.y+body.h>=p.y && body.y<p.y;
    if(wasAbove && nowBelowTop){ body.y=p.y-body.h; body.vy=0; body.onGround=true; }
    if(aabb(body,p) && !wasAbove){
      const mid=(body.x+body.w/2)-(p.x+p.w/2);
      if(mid<0) body.x=p.x-body.w; else body.x=p.x+p.w;
      body.vx=0;
    }
  }
}
function killEnemy(e){
  e.alive=false;
  if(chance(0.85)) game.loot.push(makeLoot(e.x+e.w/2,e.y+e.h/2,false));
  const q=currentQuest();
  if(q && q.type==="kills" && !q.done){
    q.progress++;
    if(q.progress>=q.needed){
      q.done=true; game.questIndex++;
      ui.openDialog(`Quest complete: ${q.title}\n\nNext: ${game.quests[game.questIndex]?.title || "None"}`);
    }
  }
}
function basicAttack(){
  const pl=game.player; if(pl.atkCd>0) return; pl.atkCd=0.28;
  const hb={x:pl.face>0?pl.x+pl.w-6:pl.x-36,y:pl.y+14,w:42,h:40};
  for(const e of game.enemies){
    if(!e.alive) continue;
    if(aabb(hb,e)){
      e.hp-=1; e.hitCd=0.12; pl.ultMeter=clamp(pl.ultMeter+8,0,100);
      e.vx+=pl.face*220; e.vy-=260;
      if(e.hp<=0) killEnemy(e);
    }
  }
}
function dash(){
  const pl=game.player; if(pl.dashCd>0) return;
  pl.dashCd=1.1; pl.vx=pl.face*820; pl.iFrames=Math.max(pl.iFrames,0.22);
}
function technique(){
  const pl=game.player; if(pl.techCd>0) return;
  pl.techCd=2.2;
  game.projectiles.push({x:pl.face>0?pl.x+pl.w:pl.x-16,y:pl.y+28,w:18,h:10,vx:pl.face*720,life:0.75});
}
function ultimate(){
  const pl=game.player; if(pl.ultCd>0 || pl.ultMeter<100) return;
  pl.ultMeter=0; pl.ultCd=9.0; pl.iFrames=Math.max(pl.iFrames,0.8);
  const camL=game.cameraX, camR=camL+W;
  for(const e of game.enemies){
    if(!e.alive) continue;
    if(e.x+e.w>camL && e.x<camR){
      e.hp-=3; e.hitCd=0.18; e.vx+=(Math.random()<0.5?-1:1)*240; e.vy-=520;
      if(e.hp<=0) killEnemy(e);
    }
  }
}
function hubInteract(){
  const pl=game.player; placeHubObjects();
  const pad={x:pl.x-10,y:pl.y-10,w:pl.w+20,h:pl.h+20};
  if(aabb(pad,game.hub.npc)){ ui.openDialog("Mentor:\n\nGet quests from the board.\nEnter the gate.\n\nThis resets every visit."); return; }
  if(aabb(pad,game.hub.board)){ ui.openDialog("QUEST BOARD:\n\n1) First Blood (5)\n2) Relic Hunt (3)\n3) Reach the Exit\n\nEnter the gate when ready."); return; }
  if(aabb(pad,game.hub.door)) game.startRun();
}
function updateHub(dt){
  const pl=game.player, groundY=H-160;
  const accel=2200,maxSpd=420,friction=2200;
  let move=0;
  if(keys.has("a")||keys.has("arrowleft")) move-=1;
  if(keys.has("d")||keys.has("arrowright")) move+=1;
  if(move!==0){ pl.face=move; pl.vx+=move*accel*dt; }
  else { if(pl.vx>0) pl.vx=Math.max(0,pl.vx-friction*dt); else if(pl.vx<0) pl.vx=Math.min(0,pl.vx+friction*dt); }
  pl.vx=clamp(pl.vx,-maxSpd,maxSpd);
  const wantJump=pressed.has("w")||pressed.has(" ")||pressed.has("arrowup");
  if(wantJump && pl.onGround) pl.vy=-720;
  pl.vy+=game.gravity*dt; pl.x+=pl.vx*dt; pl.y+=pl.vy*dt;
  if(pl.y+pl.h>=groundY){ pl.y=groundY-pl.h; pl.vy=0; pl.onGround=true; } else pl.onGround=false;
  pl.x=clamp(pl.x,40,W-80);
  if(pressed.has("enter")) hubInteract();
}
function updateDungeon(dt){
  const pl=game.player;
  pl.dashCd=Math.max(0,pl.dashCd-dt);
  pl.techCd=Math.max(0,pl.techCd-dt);
  pl.ultCd=Math.max(0,pl.ultCd-dt);
  pl.atkCd=Math.max(0,pl.atkCd-dt);
  pl.iFrames=Math.max(0,pl.iFrames-dt);

  if(pressed.has("q")) dash();
  if(pressed.has("e")) technique();
  if(pressed.has("r")) ultimate();
  if(pressed.has("enter")) basicAttack();

  const accel=2600,maxSpd=520,friction=2400;
  let move=0;
  if(keys.has("a")||keys.has("arrowleft")) move-=1;
  if(keys.has("d")||keys.has("arrowright")) move+=1;
  if(move!==0){ pl.face=move; pl.vx+=move*accel*dt; }
  else { if(pl.vx>0) pl.vx=Math.max(0,pl.vx-friction*dt); else if(pl.vx<0) pl.vx=Math.min(0,pl.vx+friction*dt); }
  pl.vx=clamp(pl.vx,-maxSpd,maxSpd);
  const wantJump=pressed.has("w")||pressed.has(" ")||pressed.has("arrowup");
  if(wantJump && pl.onGround) pl.vy=-820;

  pl.vy+=game.gravity*dt; pl.x+=pl.vx*dt; pl.y+=pl.vy*dt;
  resolvePlatforms(pl);

  const groundY=H-160;
  for(const pit of game.pits){
    if(pl.x+pl.w>pit.x && pl.x<pit.x+pit.w){
      if(pl.y+pl.h>=groundY-8 && pl.onGround) pl.onGround=false;
    }
  }
  if(pl.y>H+900){ ui.openDialog("You fell.\n\nRun resets."); game.startRun(); return; }

  game.cameraX=clamp(pl.x-W*0.45,0,5200-W+200);

  for(const e of game.enemies){
    if(!e.alive) continue;
    e.hitCd=Math.max(0,e.hitCd-dt);
    e.vy+=game.gravity*dt; e.x+=e.vx*dt; e.y+=e.vy*dt;
    resolvePlatforms(e); e.vx*=0.92;
    const dx=(pl.x+pl.w/2)-(e.x+e.w/2);
    const abs=Math.abs(dx);
    if(abs<e.aggro) e.vx+=Math.sign(dx)*e.spd*0.8*dt;

    if(aabb(pl,e) && pl.iFrames<=0){
      pl.hp-=1; pl.iFrames=0.6;
      pl.vx+=-Math.sign(dx||1)*520; pl.vy=-520;
      if(pl.hp<=0){ ui.openDialog("You blacked out.\n\nRun resets."); game.startRun(); return; }
    }
  }

  for(const pr of game.projectiles){
    pr.life-=dt; pr.x+=pr.vx*dt;
    for(const e of game.enemies){
      if(!e.alive) continue;
      if(aabb(pr,e)){
        e.hp-=2; e.hitCd=0.12; pl.ultMeter=clamp(pl.ultMeter+12,0,100);
        e.vx+=Math.sign(pr.vx)*280; e.vy-=260; pr.life=0;
        if(e.hp<=0) killEnemy(e);
      }
    }
  }
  game.projectiles=game.projectiles.filter(p=>p.life>0 && p.x>-400 && p.x<6000);

  for(const it of game.loot){
    if(it.taken) continue;
    it.vy+=game.gravity*0.35*dt; it.y+=it.vy*dt;
    for(const p of game.platforms){
      if(it.x+it.w<p.x || it.x>p.x+p.w) continue;
      const wasAbove=(it.y-it.vy*dt)+it.h<=p.y+2;
      const now=it.y+it.h>=p.y && it.y<p.y;
      if(wasAbove && now){ it.y=p.y-it.h; it.vy=0; }
    }
    if(aabb(pl,it)){
      it.taken=true; game.inventory.push({name:it.name,rarity:it.rarity,questRelic:it.questRelic});
      const q=currentQuest();
      if(q && q.type==="collect" && !q.done){
        if(it.questRelic) q.progress++;
        if(q.progress>=q.needed){
          q.done=true; game.questIndex++;
          ui.openDialog(`Quest complete: ${q.title}\n\nNext: ${game.quests[game.questIndex]?.title || "None"}`);
        }
      }
    }
  }

  const q=currentQuest();
  if(q && q.type==="reach" && !q.done){
    if(aabb(pl,game.exit)){
      q.done=true; ui.openDialog("You reached the exit.\n\nRun complete.\n\nBack to hub.");
      game.enterHub(false); return;
    }
  }
}
function drawHub(){
  const groundY=H-160;
  ctx.fillStyle="rgba(255,255,255,0.06)";
  ctx.fillRect(0,groundY,W,260);
  glowText("HUB",34,58,0.9,20);
  placeHubObjects();

  ctx.fillStyle="rgba(255,255,255,0.06)";
  roundRect(game.hub.npc.x,game.hub.npc.y,game.hub.npc.w,game.hub.npc.h,18,true,false);
  glowText("Mentor",game.hub.npc.x-10,game.hub.npc.y-10,0.5,14);

  ctx.fillStyle="rgba(255,255,255,0.05)";
  roundRect(game.hub.board.x,game.hub.board.y,game.hub.board.w,game.hub.board.h,16,true,false);
  glowText("Board",game.hub.board.x,game.hub.board.y-10,0.5,14);

  ctx.save();
  ctx.shadowColor="rgba(255,80,80,0.20)";
  ctx.shadowBlur=26;
  ctx.fillStyle="rgba(255,80,80,0.06)";
  roundRect(game.hub.door.x,game.hub.door.y,game.hub.door.w,game.hub.door.h,22,true,false);
  ctx.restore();
  glowText("Dungeon Gate",game.hub.door.x-40,game.hub.door.y-10,0.55,14);

  drawAvatarOrFallback(game.player,0);
}
function drawDungeon(){
  const cam=game.cameraX, groundY=H-160;
  ctx.save(); ctx.translate(-cam,0);

  ctx.fillStyle="rgba(255,255,255,0.05)";
  ctx.fillRect(-200,groundY,5600,260);

  ctx.fillStyle="rgba(0,0,0,0.65)";
  for(const pit of game.pits) ctx.fillRect(pit.x,groundY,pit.w,260);

  ctx.fillStyle="rgba(120,180,255,0.07)";
  for(const p of game.platforms){
    if(p.y>groundY-2 && p.h>200) continue;
    roundRect(p.x,p.y,p.w,p.h,10,true,false);
  }

  ctx.fillStyle="rgba(255,255,255,0.06)";
  roundRect(game.exit.x,game.exit.y,game.exit.w,game.exit.h,18,true,false);
  glowText("EXIT",game.exit.x+14,game.exit.y-10,0.6,16);

  for(const it of game.loot){
    if(it.taken) continue;
    ctx.save();
    ctx.shadowColor="rgba(255,255,255,0.10)";
    ctx.shadowBlur=16;
    ctx.fillStyle="rgba(120,180,255,0.12)";
    roundRect(it.x,it.y,it.w,it.h,6,true,false);
    ctx.restore();
  }

  for(const e of game.enemies){
    if(!e.alive) continue;
    ctx.save();
    ctx.shadowColor="rgba(255,255,255,0.08)";
    ctx.shadowBlur=14;
    ctx.fillStyle="rgba(0,0,0,0.55)";
    roundRect(e.x,e.y,e.w,e.h,16,true,false);
    ctx.restore();
  }

  for(const pr of game.projectiles){
    ctx.save();
    ctx.shadowColor="rgba(120,180,255,0.25)";
    ctx.shadowBlur=22;
    ctx.fillStyle="rgba(120,180,255,0.16)";
    roundRect(pr.x,pr.y,pr.w,pr.h,6,true,false);
    ctx.restore();
  }

  drawAvatarOrFallback(game.player,cam);
  ctx.restore();
}
function drawHUD(){
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,0.35)";
  roundRect(12,12,520,120,16,true,false);
  ctx.strokeStyle="rgba(255,255,255,0.10)";
  roundRect(12.5,12.5,519,119,16,false,true);

  ctx.fillStyle="rgba(255,255,255,0.80)";
  ctx.font="700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
  ctx.fillText(game.state==="act1"?"ACT 1":(game.state==="hub"?"HUB":"DUNGEON RUN"),26,36);

  if(game.state==="act1"){
    ctx.fillStyle="rgba(255,255,255,0.55)";
    ctx.font="600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
    ctx.fillText(hasCode?"code found: larp":"talk to the little character, then go right",26,60);
    ctx.restore(); return;
  }

  const pl=game.player;
  ctx.fillStyle="rgba(255,255,255,0.35)";
  ctx.font="600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
  ctx.fillText("HP",26,56);
  ctx.fillStyle="rgba(255,80,80,0.55)";
  ctx.fillRect(56,46,pl.hp*20,10);

  ctx.fillStyle="rgba(255,255,255,0.35)";
  ctx.fillText("ULT",26,76);
  ctx.fillStyle="rgba(120,180,255,0.35)";
  ctx.fillRect(56,66,(pl.ultMeter/100)*200,10);

  ctx.fillStyle="rgba(255,255,255,0.45)";
  ctx.fillText("Q dash • E tech • R ult • I inventory",26,98);

  if(game.state==="dungeon"){
    const q=currentQuest();
    if(q){
      const prog=(q.type==="kills"||q.type==="collect")?` (${q.progress}/${q.needed})`:"";
      ctx.fillStyle="rgba(255,255,255,0.55)";
      ctx.fillText(`Quest: ${q.title}${prog}`,26,118);
    }
  } else {
    ctx.fillStyle="rgba(255,255,255,0.45)";
    ctx.fillText("Talk to Board → Enter Gate",26,118);
  }

  ctx.restore();
}

/* =========================
   Main loop
========================= */
let last = performance.now();
function loop(){
  const now = performance.now();
  const dt = Math.min(0.033, (now-last)/1000);
  last = now;
  game.dt = dt;
  game.t += dt;

  // if act1 player ever goes weird, re-seat them
  if (game.state === "act1") safeAct1SpawnIfNeeded(false);

  const paused = !!ui.panel;

  if (!paused){
    if (game.state === "act1"){
      act1Move(dt);
      if (pressed.has("enter")) act1Interact();
    } else if (game.state === "hub"){
      updateHub(dt);
      if (pressed.has("i")) ui.toggleInventory();
    } else {
      updateDungeon(dt);
      if (pressed.has("i")) ui.toggleInventory();
    }
  } else {
    if (pressed.has("i")) ui.toggleInventory();
  }

  if (game.state === "act1") drawAct1();
  else if (game.state === "hub") drawHub();
  else drawDungeon();

  drawHUD();
  ui.draw(game);

  pressed.clear();
  requestAnimationFrame(loop);
}

/* =========================
   Boot
========================= */
game.state = "act1";

// spawn safely INSIDE room
function bootAct1(){
  act1.room = "void";
  safeAct1SpawnIfNeeded(true);
  clampAct1InsideRoom();
}
bootAct1();

ui.openDialog(
  "Act 1 starts.\n\nTalk to the little character.\nThen take the door on the right.\n\n(Esc closes this.)"
);

resize();
loop();
</script>
