<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>imalloveryou.com :: game</title>

<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }

  #overlay {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.82);
    color: #fff; font-family: monospace;
  }
  #panel {
    width: min(720px, 92vw);
    border: 2px solid #222;
    background: rgba(8,8,8,0.95);
    padding: 18px;
  }
  #msg { white-space: pre-wrap; font-size: 16px; line-height: 1.35; }
  #btnRow { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    font-family: monospace;
    font-size: 16px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #0b0b0b;
    color: #fff;
    cursor: pointer;
  }
  button:hover { border-color: #666; }

  #hint {
    position: fixed; left: 12px; bottom: 12px;
    font-family: monospace; font-size: 14px;
    color: rgba(255,255,255,0.65);
    user-select: none;
  }
  a#back {
    position: fixed; right: 12px; bottom: 12px;
    font-family: monospace; font-size: 14px;
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.18);
    padding: 8px 10px; border-radius: 10px;
    background: rgba(0,0,0,0.35);
  }
</style>
</head>

<body>
<canvas id="c" width="320" height="180"></canvas>

<div id="overlay">
  <div id="panel">
    <div id="msg"></div>
    <div id="btnRow">
      <button id="okBtn">OK</button>
      <button id="closeBtn">CLOSE</button>
    </div>
  </div>
</div>

<div id="hint">Move: WASD / Arrows • Enter: interact</div>
<a id="back" href="index.html">← back</a>

<script>
/* =========================
   Setup
========================= */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const overlay = document.getElementById("overlay");
const msgEl = document.getElementById("msg");
const okBtn = document.getElementById("okBtn");
const closeBtn = document.getElementById("closeBtn");

function showMsg(text, { ok=true, close=true } = {}) {
  overlay.style.display = "flex";
  msgEl.textContent = text;
  okBtn.style.display = ok ? "inline-block" : "none";
  closeBtn.style.display = close ? "inline-block" : "none";
}
okBtn.onclick = () => overlay.style.display = "none";
closeBtn.onclick = () => overlay.style.display = "none";

/* =========================
   Input
========================= */
const keys = new Set();
window.addEventListener("keydown", (e) => {
  if (overlay.style.display === "flex") {
    if (e.key === "Escape") overlay.style.display = "none";
    return;
  }
  keys.add(e.key.toLowerCase());
  if (e.key === "Enter") tryInteract();
});
window.addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

/* =========================
   Helpers
========================= */
function rectsOverlap(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function rand(min, max) { return Math.random() * (max - min) + min; }

/* =========================
   Game State
========================= */
const TS = 16;
const player = { x: 32, y: 130, w: 12, h: 14, speed: 1.35 };

const SECRET_CODE = "larp";
let hasCode = (localStorage.getItem("hasCode") === "yes");

/* =========================
   Rooms
========================= */
const rooms = {
  void: {
    name: "THE VOID",
    bg: "#050505",
    walls: [
      {x:0,y:0,w:320,h:16},{x:0,y:0,w:16,h:180},
      {x:0,y:164,w:320,h:16},{x:304,y:0,w:16,h:180},
      // a couple of blocks for shape
      {x:7*TS,y:6*TS,w:2*TS,h:2*TS},
      {x:12*TS,y:4*TS,w:1*TS,h:4*TS},
    ],
    doors: [
      // exit to hall of eyes
      {x:288,y:80,w:16,h:32,toRoom:"hall_eyes",spawn:{x:32,y:140}}
    ],
    text: [
      {x:24,y:36,t:"YOU CLICKED."},
      {x:24,y:52,t:"SO THE ROOM OPENED."},
      {x:24,y:156,t:"THE DOOR IS RIGHT."}
    ]
  },

  hall_eyes: {
    name: "HALL OF EYES",
    bg: "#030303",
    walls: [
      {x:0,y:0,w:320,h:16},{x:0,y:0,w:16,h:180},
      {x:0,y:164,w:320,h:16},{x:304,y:0,w:16,h:180},
      // narrow corridor feel (two inner walls)
      {x:4*TS,y:2*TS,w:TS,h:8*TS},
      {x:15*TS,y:2*TS,w:TS,h:8*TS},
    ],
    doors: [
      {x:16,y:80,w:16,h:32,toRoom:"void",spawn:{x:272,y:80}},
      // at the top: to code room (NPC)
      {x:144,y:16,w:32,h:16,toRoom:"code_room",spawn:{x:144,y:132}},
      // optional creepy whisper plaque (interaction)
      {x:144,y:148,w:32,h:16,event:"whisper"}
    ],
    text: [
      {x:24,y:40,t:"DON'T LOOK LEFT."},
      {x:24,y:56,t:"DON'T LOOK RIGHT."},
      {x:24,y:72,t:"WALK UP."}
    ]
  },

  code_room: {
    name: "THE ONE WHO KNOWS",
    bg: "#060606",
    walls: [
      {x:0,y:0,w:320,h:16},{x:0,y:0,w:16,h:180},
      {x:0,y:164,w:320,h:16},{x:304,y:0,w:16,h:180},
      // table-ish block
      {x:9*TS,y:6*TS,w:2*TS,h:1*TS},
      {x:8*TS,y:7*TS,w:4*TS,h:1*TS},
    ],
    doors: [
      {x:144,y:164-16,w:32,h:16,toRoom:"hall_eyes",spawn:{x:144,y:32}}
    ],
    npc: { x: 156, y: 76, w: 12, h: 16 },
    text: [
      {x:24,y:40,t:"SOMEONE IS IN HERE."},
      {x:24,y:56,t:"THEY'RE PRETENDING YOU'RE NOT."}
    ]
  }
};

let currentRoom = "void";

/* =========================
   Events / Dialogue
========================= */
function triggerEvent(id) {
  if (id === "whisper") {
    if (!hasCode) {
      showMsg("A plaque under the eyes:\n\n\"THE WORD IS SMALL.\nFOUR LETTERS.\nPLAYING PRETEND.\"\n\n(keep going up.)");
    } else {
      showMsg("The plaque is blank now.\n\nIt already got what it wanted.");
    }
  }
}

function talkToNpc() {
  if (!hasCode) {
    hasCode = true;
    localStorage.setItem("hasCode", "yes");
    showMsg(
      "The figure speaks without moving:\n\n\"You want the word?\"\n\n\"Fine.\"\n\nCODE: larp\n\n\"Don't say it like you mean it.\""
    );
  } else {
    showMsg("They tilt their head.\n\n\"You already have it.\"\n\n\"Go.\"");
  }
}

/* =========================
   Movement / Interaction
========================= */
function move(dx, dy) {
  const room = rooms[currentRoom];
  player.x += dx;
  for (const w of room.walls) if (rectsOverlap(player, w)) { player.x -= dx; break; }

  player.y += dy;
  for (const w of room.walls) if (rectsOverlap(player, w)) { player.y -= dy; break; }

  player.x = clamp(player.x, 0, canvas.width - player.w);
  player.y = clamp(player.y, 0, canvas.height - player.h);
}

function tryInteract() {
  const room = rooms[currentRoom];
  const pad = { x: player.x-2, y: player.y-2, w: player.w+4, h: player.h+4 };

  // NPC talk in code room
  if (currentRoom === "code_room" && room.npc) {
    if (rectsOverlap(pad, room.npc)) {
      talkToNpc();
      return;
    }
  }

  // Doors
  for (const d of room.doors || []) {
    if (!rectsOverlap(pad, d)) continue;

    if (d.toRoom) {
      currentRoom = d.toRoom;
      player.x = d.spawn?.x ?? 32;
      player.y = d.spawn?.y ?? 130;
      return;
    }
    if (d.event) {
      triggerEvent(d.event);
      return;
    }
  }
}

/* =========================
   Visuals
========================= */

// Draw a "legally distinct strongest sorcerer" pixel character
// White hair + blindfold + dark outfit
function drawPlayer(px, py) {
  const x = Math.floor(px);
  const y = Math.floor(py);

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(x+2, y+12, 8, 2);

  // coat/body
  ctx.fillStyle = "#0c0c0c";
  ctx.fillRect(x+3, y+6, 6, 8);

  // neck/face base
  ctx.fillStyle = "#d8d8d8";
  ctx.fillRect(x+4, y+3, 4, 3);

  // blindfold
  ctx.fillStyle = "#111";
  ctx.fillRect(x+4, y+4, 4, 1);

  // hair (white)
  ctx.fillStyle = "#f0f0f0";
  ctx.fillRect(x+3, y+2, 6, 2);
  ctx.fillRect(x+4, y+1, 4, 1);

  // little collar highlight
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(x+4, y+6, 4, 1);

  // tiny aura pixel (subtle)
  ctx.fillStyle = "rgba(120,180,255,0.35)";
  ctx.fillRect(x+2, y+5, 1, 1);
  ctx.fillRect(x+9, y+5, 1, 1);
}

// Creepy eye field for the hall
const eyeDots = [];
function initEyes() {
  eyeDots.length = 0;
  // Fill left and right “walls” with eyes
  for (let i = 0; i < 75; i++) {
    const side = Math.random() < 0.5 ? "L" : "R";
    const x = side === "L" ? rand(18, 56) : rand(264, 302);
    const y = rand(18, 160);
    const r = rand(1.5, 3);
    const blink = rand(0, 200);
    eyeDots.push({ x, y, r, blink, side });
  }
}
initEyes();

function drawEyes() {
  // subtle movement: pupils track player a bit
  const px = player.x + player.w/2;
  const py = player.y + player.h/2;

  for (const e of eyeDots) {
    e.blink += 1;

    // blink occasionally
    const blinking = (Math.sin(e.blink / 18) > 0.985);

    // sclera glow
    ctx.fillStyle = "rgba(255,255,255,0.10)";
    ctx.fillRect(e.x - e.r*2, e.y - e.r, e.r*4, e.r*2);

    if (blinking) {
      // closed eye line
      ctx.fillStyle = "rgba(255,255,255,0.22)";
      ctx.fillRect(e.x - e.r*2, e.y, e.r*4, 1);
      continue;
    }

    // eye outline
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    ctx.fillRect(e.x - e.r*2, e.y - e.r, e.r*4, 1);
    ctx.fillRect(e.x - e.r*2, e.y + e.r, e.r*4, 1);

    // pupil tracking
    const dx = clamp((px - e.x) / 60, -1, 1);
    const dy = clamp((py - e.y) / 60, -1, 1);

    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(e.x + dx*2 - 1, e.y + dy*2 - 1, 2, 2);

    // tiny specular dot
    ctx.fillStyle = "rgba(255,255,255,0.22)";
    ctx.fillRect(e.x + dx*2, e.y + dy*2, 1, 1);
  }

  // a faint “watching” haze
  ctx.fillStyle = "rgba(255,255,255,0.03)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// NPC sprite (quiet person)
function drawNpc(n) {
  const x = Math.floor(n.x);
  const y = Math.floor(n.y);

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(x+2, y+14, 8, 2);

  // body
  ctx.fillStyle = "#0b0b0b";
  ctx.fillRect(x+3, y+6, 6, 8);

  // head
  ctx.fillStyle = "#cfcfcf";
  ctx.fillRect(x+4, y+3, 4, 3);

  // hair
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(x+3, y+2, 6, 2);

  // eyes (tiny, unsettling)
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.fillRect(x+5, y+4, 1, 1);
  ctx.fillRect(x+7, y+4, 1, 1);
}

/* =========================
   Render
========================= */
function drawRoom() {
  const room = rooms[currentRoom];

  // background
  ctx.fillStyle = room.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // walls
  ctx.fillStyle = "#101010";
  for (const w of room.walls) ctx.fillRect(w.x, w.y, w.w, w.h);

  // doors
  for (const d of (room.doors || [])) {
    ctx.fillStyle = d.event ? "#151015" : "#101515";
    ctx.fillRect(d.x, d.y, d.w, d.h);
  }

  // special visuals for hall of eyes
  if (currentRoom === "hall_eyes") {
    drawEyes();
  }

  // npc
  if (currentRoom === "code_room" && room.npc) drawNpc(room.npc);

  // player
  drawPlayer(player.x, player.y);

  // text
  ctx.fillStyle = "rgba(255,255,255,0.55)";
  ctx.font = "8px monospace";
  for (const t of (room.text || [])) ctx.fillText(t.t, t.x, t.y);

  // room label + code status
  ctx.fillStyle = "rgba(255,255,255,0.18)";
  ctx.fillText(room.name, 8, 12);
  if (hasCode) ctx.fillText("code: larp", 8, 24);

  // vignette darkness for atmosphere
  const cx = player.x + player.w/2;
  const cy = player.y + player.h/2;
  const g = ctx.createRadialGradient(cx, cy, 12, cx, cy, 120);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(1, "rgba(0,0,0,0.90)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* =========================
   Loop
========================= */
function tick() {
  if (overlay.style.display !== "flex") {
    let dx = 0, dy = 0;
    if (keys.has("a") || keys.has("arrowleft")) dx -= player.speed;
    if (keys.has("d") || keys.has("arrowright")) dx += player.speed;
    if (keys.has("w") || keys.has("arrowup")) dy -= player.speed;
    if (keys.has("s") || keys.has("arrowdown")) dy += player.speed;
    move(dx, dy);
  }

  drawRoom();
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
