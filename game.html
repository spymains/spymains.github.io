<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>imalloveryou.com :: secret game</title>
<style>
  html, body { margin:0; height:100%; background:#000; overflow:hidden; }
  canvas { width:100vw; height:100vh; display:block; }

  #help{
    position:fixed; left:12px; bottom:12px;
    font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: rgba(255,255,255,0.55);
    user-select:none;
    line-height: 1.25;
    z-index: 5;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.10);
    padding: 8px 10px;
    border-radius: 12px;
    backdrop-filter: blur(6px);
    max-width: min(980px, calc(100vw - 24px));
  }
  a#back{
    position: fixed; right: 12px; bottom: 12px;
    font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.14);
    padding: 8px 10px; border-radius: 12px;
    background: rgba(0,0,0,0.35);
    z-index: 5;
    backdrop-filter: blur(6px);
  }

</head>
<body>
<canvas id="c"></canvas>
<div id="help">
  Act 1: A/D or ←/→ move • W/Space/↑ jump • Enter interact • Find code (larp) • Secret Door → Act 2<br>
  Act 2: A/D move • W/Space jump • Enter attack • Q dash • E technique • R ultimate • I inventory • Esc closes panels
</div>
<a id="back" href="index.html">← back</a>

<script>
/* =========================
   Canvas + DPI
========================= */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W=0,H=0,dpr=1;

function resize(){
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  initEyes();
  safeAct1SpawnIfNeeded(true);
  if (game.state !== "act1") placeHubObjects();
}
window.addEventListener("resize", resize);

/* =========================
   Input
========================= */
const keys = new Set();
let pressed = new Set();
window.addEventListener("keydown", (e)=>{
  const k = e.key.toLowerCase();
  if (!keys.has(k)) pressed.add(k);
  keys.add(k);

  if (ui.panel === "menu"){
    if (k === "1") ui.pick(0);
    if (k === "2") ui.pick(1);
    if (k === "3") ui.pick(2);
    if (k === "4") ui.pick(3);
  }
  if (k === "escape") ui.closeAll();
});
window.addEventListener("keyup", (e)=> keys.delete(e.key.toLowerCase()) );

/* =========================
   Helpers
========================= */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rand=(a,b)=>Math.random()*(b-a)+a;
const chance=(p)=>Math.random()<p;

function aabb(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}
function glowText(text,x,y,alpha=1,size=16){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `700 ${size}px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace`;
  ctx.fillStyle = "rgba(255,255,255,0.78)";
  ctx.shadowColor = "rgba(120,180,255,0.25)";
  ctx.shadowBlur = 10;
  ctx.fillText(text, x, y);
  ctx.restore();
}
function drawWrapped(text,x,y,maxW,lineH){
  const words = text.split(/\s+/);
  let line="";
  for (const w of words){
    const test = line ? line+" "+w : w;
    if (ctx.measureText(test).width > maxW){
      ctx.fillText(line, x, y);
      y += lineH;
      line = w;
    } else line = test;
  }
  if (line) ctx.fillText(line, x, y);
}
function drawThinLabel(text, x, y){
  ctx.save();
  ctx.font = "700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
  ctx.fillStyle = "rgba(255,255,255,0.55)";
  ctx.shadowColor = "rgba(0,0,0,0.8)";
  ctx.shadowBlur = 8;
  ctx.fillText(text, x, y);
  ctx.restore();
}

/* =========================
   UI panels (dialog + menu + inventory)
========================= */
const ui = {
  panel: null,
  dialogText: "",
  menuTitle: "",
  menuOptions: [],
  invScroll: 0,

  closeAll(){ this.panel=null; this.menuOptions=[]; },

  openDialog(text){
    this.panel="dialog";
    this.dialogText=text;
  },

  openMenu(title, options){
    this.panel="menu";
    this.menuTitle = title;
    this.menuOptions = options.slice(0,4);
  },

  pick(idx){
    if (this.panel !== "menu") return;
    const opt = this.menuOptions[idx];
    if (!opt) return;
    opt.action();
  },

  toggleInventory(){
    this.panel = (this.panel==="inventory" ? null : "inventory");
  },

  draw(){
    if (!this.panel) return;

    const pad=18;
    const boxW = Math.min(820, W-40);
    const boxH =
      this.panel==="inventory" ? Math.min(460, H-120) :
      this.panel==="menu" ? Math.min(340, H-120) :
      Math.min(280, H-120);

    const x = (W-boxW)/2, y=(H-boxH)/2;

    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.72)";
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = "rgba(14,14,18,0.92)";
    roundRect(x,y,boxW,boxH,16,true,false);
    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    ctx.lineWidth = 1;
    roundRect(x+0.5,y+0.5,boxW-1,boxH-1,16,false,true);

    if (this.panel==="dialog"){
      ctx.fillStyle = "rgba(255,255,255,0.84)";
      ctx.font = "600 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      drawWrapped(this.dialogText, x+pad, y+pad+6, boxW-pad*2, 19);

      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.font = "500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText("Esc to close.", x+pad, y+boxH-18);
    }

    if (this.panel==="menu"){
      ctx.fillStyle = "rgba(255,255,255,0.86)";
      ctx.font = "800 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText(this.menuTitle, x+pad, y+pad+2);

      ctx.font = "600 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      let yy = y+pad+36;
      for (let i=0;i<this.menuOptions.length;i++){
        const opt = this.menuOptions[i];
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(x+pad, yy-16, boxW-pad*2, 26);
        ctx.fillStyle = "rgba(255,255,255,0.86)";
        ctx.fillText(`${i+1}) ${opt.label}`, x+pad+10, yy+2);
        yy += 34;
      }

      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.font = "500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText("Press 1–4. Esc closes.", x+pad, y+boxH-18);
    }

    if (this.panel==="inventory"){
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.font = "700 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText("INVENTORY", x+pad, y+pad+2);

      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.font = "500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText("Press I to close.", x+pad, y+pad+22);

      const listY = y+pad+42;
      const listH = boxH - (pad+60);

      ctx.save();
      ctx.beginPath();
      ctx.rect(x+pad, listY, boxW-pad*2, listH);
      ctx.clip();

      let yy = listY - this.invScroll;
      for (const it of game.inventory){
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(x+pad, yy, boxW-pad*2, 24);
        ctx.fillStyle = "rgba(255,255,255,0.80)";
        ctx.font = "600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
        ctx.fillText(`${it.name}  [${it.rarity}]`, x+pad+10, yy+17);
        yy += 26;
      }
      ctx.restore();

      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.font = "500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText(`Items: ${game.inventory.length}`, x+pad, y+boxH-18);
    }

    ctx.restore();
  }
};

/* =========================
   Avatar (optional avatar.png)
========================= */
const avatarImg = new Image();
let avatarReady = false;
avatarImg.onload = () => { avatarReady = true; };
avatarImg.onerror = () => { avatarReady = false; };
avatarImg.src = "avatar.png";

function drawAvatarOrFallback(pl, camX=0){
  const x = pl.x - camX, y = pl.y;

  ctx.save();
  ctx.shadowColor = "rgba(120,180,255,0.25)";
  ctx.shadowBlur = 22;
  ctx.strokeStyle = "rgba(120,180,255,0.10)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x + pl.w/2, y + pl.h/2, 44, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  if (avatarReady){
    ctx.save();
    if (pl.iFrames > 0) ctx.globalAlpha = 0.75;
    if (pl.face < 0){
      ctx.translate(x + pl.w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(avatarImg, 0, 0, avatarImg.width, avatarImg.height, 0, y, pl.w, pl.h);
    } else {
      ctx.drawImage(avatarImg, 0, 0, avatarImg.width, avatarImg.height, x, y, pl.w, pl.h);
    }
    ctx.restore();
    return;
  }

  ctx.fillStyle = "rgba(255,255,255,0.10)";
  roundRect(x, y, pl.w, pl.h, 18, true, false);
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(x+8, y+22, pl.w-16, 4);
}

/* =========================
   ACT 1
========================= */
let hasCode = false;

const act1 = {
  room: "void",
  player: {
    x: 0, y: 0, w: 44, h: 72,
    vx: 0, vy: 0, onGround: false, face: 1,
    coyote: 0, jumpBuf: 0
  },
  groundY(){ return H - 150; },

  rooms: {
    void: {
      name: "THE VOID",
      walls: (W,H)=>[
        {x:40,y:40,w:W-80,h:20},{x:40,y:40,w:20,h:H-80},
        {x:40,y:H-60,w:W-80,h:20},{x:W-60,y:40,w:20,h:H-80}
      ],
      doors: (W,H,g)=>[
        {x:W-96,y:g-120,w:44,h:120,to:"hall_eyes", spawn:{x:120,y:g-72}, label:"HALL"}
      ],
      npc: (W,H,g)=>({ x: W*0.18, y: g - 96, w: 56, h: 96 }),
      text: [
        {t:"YOU CLICKED.", y:110},
        {t:"SO THE ROOM OPENED.", y:136},
        {t:"THE DOOR IS RIGHT.", y:(H)=>H-84}
      ]
    },

    hall_eyes: {
      name: "HALL OF EYES",
      walls: (W,H)=>[
        {x:40,y:40,w:W-80,h:20},{x:40,y:40,w:20,h:H-80},
        {x:40,y:H-60,w:W-80,h:20},{x:W-60,y:40,w:20,h:H-80},
        {x:W*0.26,y:90,w:26,h:H*0.55},
        {x:W*0.74-26,y:90,w:26,h:H*0.55}
      ],
      doors: (W,H,g)=>[
        // back to void (far left)
        {x:54,y:g-120,w:44,h:120,to:"void", spawn:{x:W*0.50,y:g-72}, label:"BACK"},

        // ✅ FIX: code-room door moved to LEFT-CENTER and near floor, NOT overlapping secret
        {x:W*0.30-60, y:g-140, w:120, h:110, to:"code_room", spawn:{x:W*0.50-40,y:g-72}, label:"CODE"},

        // secret door moved to RIGHT-CENTER, near floor, slim
        {x:W*0.70-70, y:g-105, w:140, h:75, event:"secretDoor", label:"SECRET"}
      ],
      text: [
        {t:"DON'T LOOK LEFT.", y:110},
        {t:"DON'T LOOK RIGHT.", y:136},
        {t:"WALK UP.", y:162}
      ]
    },

    code_room: {
      name: "THE ONE WHO KNOWS",
      walls: (W,H)=>[
        {x:40,y:40,w:W-80,h:20},{x:40,y:40,w:20,h:H-80},
        {x:40,y:H-60,w:W-80,h:20},{x:W-60,y:40,w:20,h:H-80},
        {x:W*0.5-160,y:H*0.62,w:320,h:24}
      ],
      doors: (W,H,g)=>[
        {x:W*0.5-70,y:g+2,w:140,h:18,to:"hall_eyes", spawn:{x:W*0.50,y:g-92}, label:"RETURN"}
      ],
      npc: (W,H,g)=>({ x: W*0.5-28, y: g - 150, w: 70, h: 120 }),
      text: [
        {t:"SOMEONE IS IN HERE.", y:110},
        {t:"THEY PRETEND YOU'RE NOT.", y:136}
      ]
    }
  }
};

const eyes = [];
function initEyes(){
  eyes.length = 0;
  for (let i=0;i<140;i++){
    const side = Math.random()<0.5 ? "L":"R";
    const x = side==="L" ? rand(70, 210) : rand(W-210, W-70);
    const y = rand(80, H-160);
    eyes.push({x,y, blink: rand(0,220), r: rand(4,12)});
  }
}

function act1Walls(){ return act1.rooms[act1.room].walls(W,H); }
function act1Doors(){
  const g = act1.groundY();
  return act1.rooms[act1.room].doors(W,H,g);
}
function act1Npc(){
  const g = act1.groundY();
  const room = act1.rooms[act1.room];
  return room.npc ? room.npc(W,H,g) : null;
}
function safeAct1SpawnIfNeeded(force=false){
  const pl = act1.player;
  const g = act1.groundY();
  if (force || !isFinite(pl.x) || !isFinite(pl.y) || pl.y > H+500 || pl.y < -500){
    pl.x = Math.max(90, Math.min(W*0.5, W-140));
    pl.y = g - pl.h;
    pl.vx = 0; pl.vy = 0;
    pl.onGround = true;
    pl.coyote = 0; pl.jumpBuf = 0;
  }
}
function clampAct1InsideRoom(){
  const pl = act1.player;
  const g = act1.groundY();
  const pad = 62;
  pl.x = clamp(pl.x, pad, W - pad - pl.w);
  pl.y = clamp(pl.y, 60, g - pl.h);
}

function act1Move(dt){
  const pl = act1.player;

  const accel = 2600, maxSpd = 520, friction = 5200;
  const jumpVel = -820, coyoteTime = 0.10, jumpBuffer = 0.12;

  let move = 0;
  if (keys.has("a") || keys.has("arrowleft")) move -= 1;
  if (keys.has("d") || keys.has("arrowright")) move += 1;

  const jumpPressed = pressed.has("w") || pressed.has(" ") || pressed.has("arrowup");
  if (jumpPressed) pl.jumpBuf = jumpBuffer;
  else pl.jumpBuf = Math.max(0, pl.jumpBuf - dt);

  if (move !== 0){
    pl.face = move;
    pl.vx += move * accel * dt;
  } else {
    if (pl.vx > 0) pl.vx = Math.max(0, pl.vx - friction * dt);
    else if (pl.vx < 0) pl.vx = Math.min(0, pl.vx + friction * dt);
  }
  pl.vx = clamp(pl.vx, -maxSpd, maxSpd);

  pl.vy += game.gravity * dt;

  pl.x += pl.vx * dt;
  pl.y += pl.vy * dt;

  const walls = act1Walls();
  pl.onGround = false;

  for (const w of walls){
    if (!aabb(pl, w)) continue;

    const prevY = pl.y - pl.vy * dt;
    const wasAbove = prevY + pl.h <= w.y + 2;

    if (wasAbove){
      pl.y = w.y - pl.h;
      pl.vy = 0;
      pl.onGround = true;
    } else {
      const mid = (pl.x + pl.w/2) - (w.x + w.w/2);
      if (mid < 0) pl.x = w.x - pl.w;
      else pl.x = w.x + w.w;
      pl.vx = 0;
    }
  }

  const g = act1.groundY();
  if (pl.y + pl.h >= g){
    pl.y = g - pl.h;
    pl.vy = 0;
    pl.onGround = true;
  }

  if (pl.onGround) pl.coyote = coyoteTime;
  else pl.coyote = Math.max(0, pl.coyote - dt);

  if (pl.jumpBuf > 0 && pl.coyote > 0){
    pl.vy = jumpVel;
    pl.jumpBuf = 0;
    pl.coyote = 0;
    pl.onGround = false;
  }

  clampAct1InsideRoom();
}

function act1Interact(){
  const pl = act1.player;
  const pad = { x:pl.x-32, y:pl.y-32, w:pl.w+64, h:pl.h+64 };

  if (act1.room === "void"){
    const npc = act1Npc();
    if (npc && aabb(pad, npc)){
      ui.openDialog("Little figure:\n\n“Hall of Eyes is next.”\n“The word is held by someone else.”");
      return;
    }
  }

  if (act1.room === "code_room"){
    const npc = act1Npc();
    if (npc && aabb(pad, npc)){
      hasCode = true;
      ui.openDialog("The figure speaks like a narrator.\n\nCODE: larp\n\n“Return to the hallway.”\n“The secret door will listen.”");
      return;
    }
  }

  for (const d of act1Doors()){
    if (d.event === "secretDoor" && !hasCode) continue;
    if (!aabb(pad, d)) continue;

    if (d.to){
      act1.room = d.to;
      act1.player.x = d.spawn.x;
      act1.player.y = d.spawn.y;
      act1.player.vx = 0;
      act1.player.vy = 0;
      clampAct1InsideRoom();
      return;
    }

    if (d.event === "secretDoor"){
      game.enterHub(true);
      return;
    }
  }
}

/* ===== Act 1 draw helpers ===== */
function drawAct1FloorAndTexture(){
  const g = act1.groundY();

  ctx.fillStyle = "rgba(255,255,255,0.05)";
  ctx.fillRect(0, g, W, H-g);

  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.lineWidth = 1;
  for (let i=0;i<22;i++){
    const y = g + 10 + i*10 + Math.sin(game.t*0.9 + i)*2;
    ctx.beginPath();
    ctx.moveTo(20, y);
    ctx.lineTo(W-20, y);
    ctx.stroke();
  }

  const grad = ctx.createRadialGradient(W*0.5, H*0.55, Math.min(W,H)*0.22, W*0.5, H*0.55, Math.max(W,H)*0.85);
  grad.addColorStop(0, "rgba(0,0,0,0)");
  grad.addColorStop(1, "rgba(0,0,0,0.62)");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

function drawSmallNpc(npc, label){
  ctx.save();
  ctx.shadowColor = "rgba(255,255,255,0.06)";
  ctx.shadowBlur = 14;
  ctx.fillStyle = "rgba(255,255,255,0.08)";
  roundRect(npc.x, npc.y, npc.w, npc.h, 16, true, false);
  ctx.restore();
  ctx.fillStyle = "rgba(0,0,0,0.40)";
  ctx.fillRect(npc.x + 14, npc.y + 30, npc.w - 28, 6);
  drawThinLabel(label, npc.x, npc.y - 8);
}

function drawDoor(d, canUse){
  // slim door frame (not a giant block)
  ctx.save();
  ctx.globalAlpha = canUse ? 1 : 0.22;

  const isSecret = d.event === "secretDoor";
  const frame = isSecret ? "rgba(255,80,80,0.38)" : "rgba(120,180,255,0.32)";
  const fill  = isSecret ? "rgba(255,80,80,0.06)" : "rgba(120,180,255,0.05)";

  ctx.fillStyle = fill;
  roundRect(d.x, d.y, d.w, d.h, 10, true, false);

  ctx.strokeStyle = frame;
  ctx.lineWidth = 2;
  roundRect(d.x+0.5, d.y+0.5, d.w-1, d.h-1, 10, false, true);

  if (d.label){
    drawThinLabel(d.label, d.x + 10, d.y - 8);
  }
  ctx.restore();
}

function drawAct1(){
  ctx.fillStyle = "#050507";
  ctx.fillRect(0,0,W,H);

  drawAct1FloorAndTexture();

  const room = act1.rooms[act1.room];
  const walls = act1Walls();
  ctx.fillStyle = "rgba(255,255,255,0.045)";
  for (const w of walls) ctx.fillRect(w.x,w.y,w.w,w.h);

  // eyes
  if (act1.room === "hall_eyes"){
    const px = act1.player.x + act1.player.w/2;
    const py = act1.player.y + act1.player.h/2;

    for (const e of eyes){
      e.blink += 1;
      const blinking = Math.sin(e.blink/14) > 0.992;

      ctx.beginPath();
      ctx.fillStyle = "rgba(255,255,255,0.035)";
      ctx.ellipse(e.x, e.y, e.r*2.3, e.r*1.2, 0, 0, Math.PI*2);
      ctx.fill();

      if (!blinking){
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(e.x, e.y, e.r*2.4, e.r*1.3, 0, 0, Math.PI*2);
        ctx.stroke();

        const dx = clamp((px - e.x)/140, -1, 1);
        const dy = clamp((py - e.y)/140, -1, 1);
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.beginPath();
        ctx.arc(e.x + dx*e.r*0.9, e.y + dy*e.r*0.9, Math.max(2, e.r*0.55), 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // doors (only draw secret if code is found)
  for (const d of act1Doors()){
    const canUse = (d.event !== "secretDoor") || hasCode;
    if (d.event === "secretDoor" && !hasCode) continue;
    drawDoor(d, canUse);
  }

  // npc
  if (act1.room === "void"){
    const npc = act1Npc();
    if (npc) drawSmallNpc(npc, "…");
  }
  if (act1.room === "code_room"){
    const npc = act1Npc();
    if (npc) drawSmallNpc(npc, "…");
  }

  drawAvatarOrFallback(act1.player, 0);

  // room title + flavor text (kept clean and out of the way)
  glowText(room.name, 16, 70, 0.55, 16);

  ctx.font = "600 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
  ctx.fillStyle = "rgba(255,255,255,0.48)";
  for (const line of (room.text||[])){
    const yy = (typeof line.y === "function") ? line.y(H) : line.y;
    ctx.fillText(line.t, 16, yy);
  }
}

function placeHubObjects(){
  const groundY = H - 160;
  game.hub.npc.y = groundY - game.hub.npc.h;
  game.hub.board.y = groundY - game.hub.board.h;
  game.hub.door.y = groundY - game.hub.door.h;
}

function currentQuest(){ return game.quests[game.questIndex]; }

function makeEnemy(x,y){ return {x,y,w:46,h:62,vx:0,vy:0,hp:3,alive:true,aggro:520,spd:rand(160,220),hitCd:0,onGround:false}; }

function makeLoot(x,y,questRelic=false){
  const roll=Math.random();
  let rarity="common";
  if(roll<0.55) rarity="common"; else if(roll<0.78) rarity="uncommon"; else if(roll<0.92) rarity="rare"; else if(roll<0.985) rarity="epic"; else rarity="mythic";
  const names=["Ink Charm","Moon Thread","Hush Ring","Shiver Crest","Vault Token","Glass Fang","Neon Seal","Warden Key","Paper Relic","Star Scrap"];
  const name=questRelic?"Relic Shard":names[(Math.random()*names.length)|0];
  return {x,y,w:22,h:22,vy:0,taken:false,rarity,name,questRelic};
}

function genDungeon(){
  game.platforms=[]; game.enemies=[]; game.loot=[]; game.projectiles=[]; game.pits=[];
  const groundY=H-160, levelLen=5200;
  game.platforms.push({x:-200,y:groundY,w:levelLen+400,h:260});

  let x=260;
  for(let i=0;i<18;i++){
    const w=rand(140,260);
    const y=groundY-rand(140,360);
    game.platforms.push({x,y,w,h:26});
    x+=rand(200,340);
  }

  for(let i=0;i<6;i++){
    const px=rand(600,levelLen-800);
    const pw=rand(140,240);
    game.pits.push({x:px,w:pw});
  }

  for(let i=0;i<14;i++){
    const ex=rand(520,levelLen-500);
    const ey=groundY-80;
    game.enemies.push(makeEnemy(ex,ey));
  }
  for(let i=0;i<3;i++){
    const lx=rand(900,levelLen-900);
    const ly=groundY-rand(220,380);
    game.loot.push(makeLoot(lx,ly,true));
  }

  game.exit.x=levelLen-140;
  game.exit.y=groundY-120;
  game.exit.w=90;
  game.exit.h=160;

  game.cameraX=0;
}

function resolvePlatforms(body){
  body.onGround=false;
  for(const p of game.platforms){
    if(body.x+body.w<p.x || body.x>p.x+p.w) continue;

    const prevY=body.y-body.vy*game.dt;
    const wasAbove=prevY+body.h<=p.y+2;
    const nowBelowTop=body.y+body.h>=p.y && body.y<p.y;

    if(wasAbove && nowBelowTop){
      body.y=p.y-body.h;
      body.vy=0;
      body.onGround=true;
    }

    if(aabb(body,p) && !wasAbove){
      const mid=(body.x+body.w/2)-(p.x+p.w/2);
      if(mid<0) body.x=p.x-body.w;
      else body.x=p.x+p.w;
      body.vx=0;
    }
  }
}

function killEnemy(e){
  e.alive=false;
  if(chance(0.85)) game.loot.push(makeLoot(e.x+e.w/2,e.y+e.h/2,false));
  const q=currentQuest();
  if(q && q.type==="kills" && !q.done){
    q.progress++;
    if(q.progress>=q.needed){
      q.done=true; game.questIndex++;
      ui.openDialog(`Quest complete: ${q.title}\n\nNext: ${game.quests[game.questIndex]?.title || "None"}`);
    }
  }
}

/* ===== Combat ===== */
function basicAttack(){
  const pl=game.player;
  if(pl.atkCd>0) return;
  pl.atkCd=0.22;

  const hb={x:pl.face>0?pl.x+pl.w-6:pl.x-36,y:pl.y+14,w:42,h:40};
  for(const e of game.enemies){
    if(!e.alive) continue;
    if(aabb(hb,e)){
      e.hp-=1; e.hitCd=0.12;
      pl.ultMeter=clamp(pl.ultMeter+8,0,100);
      e.vx+=pl.face*220; e.vy-=260;
      if(e.hp<=0) killEnemy(e);
    }
  }
}
function dash(){
  const pl=game.player;
  if(pl.dashCd>0) return;
  pl.dashCd=0.9;
  pl.vx=pl.face*820;
  pl.iFrames=Math.max(pl.iFrames,0.18);
}
function technique(){
  const pl=game.player;
  if(pl.techCd>0) return;
  pl.techCd=1.8;
  game.projectiles.push({x:pl.face>0?pl.x+pl.w:pl.x-16,y:pl.y+28,w:18,h:10,vx:pl.face*720,life:0.75});
}
function ultimate(){
  const pl=game.player;
  if(pl.ultCd>0 || pl.ultMeter<100) return;
  pl.ultMeter=0;
  pl.ultCd=7.5;
  pl.iFrames=Math.max(pl.iFrames,0.55);

  const camL=game.cameraX, camR=camL+W;
  for(const e of game.enemies){
    if(!e.alive) continue;
    if(e.x+e.w>camL && e.x<camR){
      e.hp-=3; e.hitCd=0.18;
      e.vx+=(Math.random()<0.5?-1:1)*240; e.vy-=520;
      if(e.hp<=0) killEnemy(e);
    }
  }
}

/* ===== Tight movement helper (Act 2 hub) ===== */
function applyTightMovement(pl, dt, groundY){
  const accel = 2800, maxSpd = 540, friction = 5600;
  const jumpVel = -860, coyoteTime = 0.10, jumpBuffer = 0.12;

  let move = 0;
  if(keys.has("a")||keys.has("arrowleft")) move -= 1;
  if(keys.has("d")||keys.has("arrowright")) move += 1;

  const jumpPressed = pressed.has("w") || pressed.has(" ") || pressed.has("arrowup");
  if (jumpPressed) pl.jumpBuf = jumpBuffer;
  else pl.jumpBuf = Math.max(0, pl.jumpBuf - dt);

  if(move!==0){
    pl.face=move;
    pl.vx += move*accel*dt;
  } else {
    if(pl.vx>0) pl.vx=Math.max(0, pl.vx-friction*dt);
    else if(pl.vx<0) pl.vx=Math.min(0, pl.vx+friction*dt);
  }
  pl.vx = clamp(pl.vx, -maxSpd, maxSpd);

  pl.vy += game.gravity*dt;
  pl.x += pl.vx*dt;
  pl.y += pl.vy*dt;

  if (groundY !== null){
    if(pl.y+pl.h>=groundY){
      pl.y=groundY-pl.h;
      pl.vy=0;
      pl.onGround=true;
    } else pl.onGround=false;

    if(pl.onGround) pl.coyote=coyoteTime;
    else pl.coyote=Math.max(0, pl.coyote-dt);

    if(pl.jumpBuf>0 && pl.coyote>0){
      pl.vy = jumpVel;
      pl.jumpBuf=0;
      pl.coyote=0;
      pl.onGround=false;
    }
  }
}

function hubInteract(){
  const pl=game.player; placeHubObjects();
  const pad={x:pl.x-22,y:pl.y-22,w:pl.w+44,h:pl.h+44};

  if(aabb(pad,game.hub.npc)){ openMentorMenu(); return; }
  if(aabb(pad,game.hub.board)){
    ui.openDialog("QUEST BOARD:\n\n1) First Blood (5)\n2) Relic Hunt (3)\n3) Reach the Exit\n\nEnter the gate when ready.");
    return;
  }
  if(aabb(pad,game.hub.door)){ game.startRun(); return; }
}

function updateHub(dt){
  const pl=game.player;
  const groundY=H-160;

  applyTightMovement(pl, dt, groundY);
  pl.x = clamp(pl.x, 40, W-80);

  if(pressed.has("enter")) hubInteract();
  if(pressed.has("i")) ui.toggleInventory();
}

function updateDungeon(dt){
  const pl=game.player;

  pl.dashCd=Math.max(0,pl.dashCd-dt);
  pl.techCd=Math.max(0,pl.techCd-dt);
  pl.ultCd=Math.max(0,pl.ultCd-dt);
  pl.atkCd=Math.max(0,pl.atkCd-dt);
  pl.iFrames=Math.max(0,pl.iFrames-dt);

  if(pressed.has("q")) dash();
  if(pressed.has("e")) technique();
  if(pressed.has("r")) ultimate();
  if(pressed.has("enter")) basicAttack();
  if(pressed.has("i")) ui.toggleInventory();

  // tight movement (platform grounded)
  const accel = 2800, maxSpd = 540, friction = 5600;
  const jumpVel = -860, coyoteTime = 0.10, jumpBuffer = 0.12;

  let move=0;
  if(keys.has("a")||keys.has("arrowleft")) move-=1;
  if(keys.has("d")||keys.has("arrowright")) move+=1;

  const jumpPressed = pressed.has("w") || pressed.has(" ") || pressed.has("arrowup");
  if (jumpPressed) pl.jumpBuf = jumpBuffer;
  else pl.jumpBuf = Math.max(0, pl.jumpBuf - dt);

  if(move!==0){
    pl.face=move;
    pl.vx += move*accel*dt;
  } else {
    if(pl.vx>0) pl.vx=Math.max(0, pl.vx-friction*dt);
    else if(pl.vx<0) pl.vx=Math.min(0, pl.vx+friction*dt);
  }
  pl.vx=clamp(pl.vx,-maxSpd,maxSpd);

  pl.vy += game.gravity*dt;
  pl.x += pl.vx*dt;
  pl.y += pl.vy*dt;

  resolvePlatforms(pl);

  if(pl.onGround) pl.coyote=coyoteTime;
  else pl.coyote=Math.max(0, pl.coyote-dt);

  if(pl.jumpBuf>0 && pl.coyote>0){
    pl.vy=jumpVel;
    pl.jumpBuf=0;
    pl.coyote=0;
    pl.onGround=false;
  }

  // pits / fall reset
  const groundY=H-160;
  for(const pit of game.pits){
    if(pl.x+pl.w>pit.x && pl.x<pit.x+pit.w){
      if(pl.y+pl.h>=groundY-8 && pl.onGround) pl.onGround=false;
    }
  }
  if(pl.y>H+900){ ui.openDialog("You fell.\n\nRun resets."); game.startRun(); return; }

  // camera
  game.cameraX=clamp(pl.x-W*0.45,0,5200-W+200);

  // enemies
  for(const e of game.enemies){
    if(!e.alive) continue;
    e.hitCd=Math.max(0,e.hitCd-dt);
    e.vy+=game.gravity*dt;
    e.x+=e.vx*dt;
    e.y+=e.vy*dt;
    resolvePlatforms(e);
    e.vx*=0.92;

    const dx=(pl.x+pl.w/2)-(e.x+e.w/2);
    const abs=Math.abs(dx);
    if(abs<e.aggro) e.vx+=Math.sign(dx)*e.spd*0.8*dt;

    if(aabb(pl,e) && pl.iFrames<=0){
      pl.hp-=1;
      pl.iFrames=0.55;
      pl.vx+=-Math.sign(dx||1)*520;
      pl.vy=-520;
      if(pl.hp<=0){ ui.openDialog("You blacked out.\n\nRun resets."); game.startRun(); return; }
    }
  }

  // projectiles
  for(const pr of game.projectiles){
    pr.life-=dt;
    pr.x+=pr.vx*dt;
    for(const e of game.enemies){
      if(!e.alive) continue;
      if(aabb(pr,e)){
        e.hp-=2; e.hitCd=0.12;
        pl.ultMeter=clamp(pl.ultMeter+12,0,100);
        e.vx+=Math.sign(pr.vx)*280; e.vy-=260;
        pr.life=0;
        if(e.hp<=0) killEnemy(e);
      }
    }
  }
  game.projectiles=game.projectiles.filter(p=>p.life>0 && p.x>-400 && p.x<6000);

  // loot
  for(const it of game.loot){
    if(it.taken) continue;
    it.vy+=game.gravity*0.35*dt;
    it.y+=it.vy*dt;

    for(const p of game.platforms){
      if(it.x+it.w<p.x || it.x>p.x+p.w) continue;
      const wasAbove=(it.y-it.vy*dt)+it.h<=p.y+2;
      const now=it.y+it.h>=p.y && it.y<p.y;
      if(wasAbove && now){ it.y=p.y-it.h; it.vy=0; }
    }

    if(aabb(pl,it)){
      it.taken=true;
      game.inventory.push({name:it.name,rarity:it.rarity,questRelic:it.questRelic});
      const q=currentQuest();
      if(q && q.type==="collect" && !q.done){
        if(it.questRelic) q.progress++;
        if(q.progress>=q.needed){
          q.done=true; game.questIndex++;
          ui.openDialog(`Quest complete: ${q.title}\n\nNext: ${game.quests[game.questIndex]?.title || "None"}`);
        }
      }
    }
  }

  // exit quest
  const q=currentQuest();
  if(q && q.type==="reach" && !q.done){
    if(aabb(pl,game.exit)){
      q.done=true;
      ui.openDialog("You reached the exit.\n\nRun complete.\n\nBack to hub.");
      game.enterHub(false);
      return;
    }
  }
}

  const groundY=H-160;
  ctx.fillStyle="rgba(255,255,255,0.06)";
  ctx.fillRect(0,groundY,W,260);

  placeHubObjects();

  // mentor
  ctx.fillStyle="rgba(255,255,255,0.06)";
  roundRect(game.hub.npc.x,game.hub.npc.y,game.hub.npc.w,game.hub.npc.h,18,true,false);

  ctx.fillStyle="rgba(255,255,255,0.05)";
  roundRect(game.hub.board.x,game.hub.board.y,game.hub.board.w,game.hub.board.h,16,true,false);

function drawDungeon(){
  const cam=game.cameraX, groundY=H-160;

  ctx.fillStyle="#050507";
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(-cam,0);

  ctx.fillStyle="rgba(255,255,255,0.05)";
  ctx.fillRect(-200,groundY,5600,260);

  ctx.fillStyle="rgba(0,0,0,0.65)";
  for(const pit of game.pits) ctx.fillRect(pit.x,groundY,pit.w,260);

  ctx.fillStyle="rgba(120,180,255,0.07)";
  for(const p of game.platforms){
    if(p.y>groundY-2 && p.h>200) continue;
    roundRect(p.x,p.y,p.w,p.h,10,true,false);
  }

  ctx.fillStyle="rgba(255,255,255,0.06)";
  roundRect(game.exit.x,game.exit.y,game.exit.w,game.exit.h,18,true,false);
  drawThinLabel("EXIT",game.exit.x+14,game.exit.y-8);

  for(const it of game.loot){
    if(it.taken) continue;
    ctx.save();
    ctx.shadowColor="rgba(255,255,255,0.10)";
    ctx.shadowBlur=16;
    ctx.fillStyle="rgba(120,180,255,0.12)";
    roundRect(it.x,it.y,it.w,it.h,6,true,false);
    ctx.restore();
  }

  for(const e of game.enemies){
    if(!e.alive) continue;
    ctx.save();
    ctx.shadowColor="rgba(255,255,255,0.08)";
    ctx.shadowBlur=14;
    ctx.fillStyle="rgba(0,0,0,0.55)";
    roundRect(e.x,e.y,e.w,e.h,16,true,false);
    ctx.restore();
  }

  for(const pr of game.projectiles){
    ctx.save();
    ctx.shadowColor="rgba(120,180,255,0.25)";
    ctx.shadowBlur=18;
    ctx.fillStyle="rgba(120,180,255,0.16)";
    roundRect(pr.x,pr.y,pr.w,pr.h,6,true,false);
    ctx.restore();
  }

  drawAvatarOrFallback(game.player,cam);
  ctx.restore();
}

/* =========================
   Main loop
========================= */
let last = performance.now();
function loop(){
  const now = performance.now();
  const dt = Math.min(0.033, (now-last)/1000);
  last = now;

  game.dt = dt;
  game.t += dt;

  const paused = !!ui.panel;

  if (!paused){
    if (game.state==="act1"){
      safeAct1SpawnIfNeeded(false);
      act1Move(dt);
      if (pressed.has("enter")) act1Interact();
    } else if (game.state==="hub"){
      updateHub(dt);
    } else {
      updateDungeon(dt);
    }
  } else {
    if (pressed.has("i")) ui.toggleInventory();
  }

  if (game.state==="act1") drawAct1();
  else if (game.state==="hub") drawHub();
  else drawDungeon();

  drawStatus();
  ui.draw();

  pressed.clear();
  requestAnimationFrame(loop);
}

/* =========================
   Boot (restarts every reload)
