<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>imalloveryou.com</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
  }

  .container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: black;
  }

  /* Invisible tongue hitbox */
  .tongue {
    position: absolute;
    top: 58%;        /* adjust if needed */
    left: 50%;
    width: 18%;
    height: 26%;
    transform: translate(-50%, -50%);
    cursor: pointer;
  }
</style>
</head>

<body>

<audio id="bgm" src="music.mp3"></audio>

<div class="container">
  <img id="mainImage" src="guy.png" alt="Image">
  <div class="tongue" id="tongue"></div>
</div>

<script>
  const tongue = document.getElementById("tongue");
  const image = document.getElementById("mainImage");
  const audio = document.getElementById("bgm");

  // Tongue click → GIF + music
  tongue.addEventListener("click", function(e) {
    e.stopPropagation(); // prevents redirect to game
    image.src = "yourgif.gif";
    audio.volume = 0.7;
    audio.loop = true;
    audio.play().catch(() => {});
    tongue.style.display = "none";
  });

  // Click anywhere else → go to minigame
  document.addEventListener("click", function() {
    window.location.href = "game.html";
  });
</script>

</body>
</html>
